  - component_id: taxalens-wikimedia-review-fixture-47248e36944c
    source_repository: karikris/taxalens
    source_commit: c5e87ead4fdb26d5c5624bbb8d8d67e46d8eddbc
    source_path: apps/web/src/review/assets/papilio-demoleus-open-wing.jpg
    destination_path: apps/web/public/media/review-fixture-47248e36944c.jpg
    migration_kind: copied
    reason: Provide one credential-free, rights-cleared image for the review-first landing experience without importing the Papilio campaign bundle.
    build_week_scope: modified-existing
    source_license: CC-BY-SA-4.0
    changes:
      - Preserve the exact JPEG bytes and SHA-256 while renaming the file to avoid leaking a provider label through its public path.
      - Retain creator, source, licence, attribution, immutable origin commit, provider-assertion, non-representative, and no-scientific-claim metadata.
      - Ask a generic blinded butterfly question and enable scientific responses only after the integrity-checked image loads.
    tests:
      - Exact media SHA-256, byte count, rights fields, and no-scientific-claim verification.
      - Component tests for attribution, blinded readiness, successful load, and unavailable-media fallback.
      - Repository rights-manifest fingerprint and permission verification.
    status: verified
  - component_id: taxalens-independent-assignment-pattern-v1
    source_repository: karikris/taxalens
    source_commit: c5e87ead4fdb26d5c5624bbb8d8d67e46d8eddbc
    source_path: apps/web/src/review/domain/{verificationContracts.ts,verificationConsensus.ts}
    destination_path: supabase/migrations/20260718013600_repeated_independent_assignments.sql
    migration_kind: interface_pattern
    reason: Preserve independent-review counts and conflict escalation while making assignment authority, qualification, concurrency, privacy, and replacement behavior ButterflyLens-owned.
    build_week_scope: new
    source_license: MIT
    changes:
      - Define versioned server-only defaults for ordinary, disagreement, potential-gap, reference, and high-impact campaigns.
      - Enforce distinct reviewers, monotonic replacement-safe rounds, active project membership, verified qualifications, and an expert gate in Postgres.
      - Expose aggregate assignment progress only to the service role and never return reviewer identities or decisions.
    tests:
      - Static migration tests for every required default, campaign gate, assignment invariant, privacy boundary, and pgTAP plan.
      - Twenty-one pgTAP assertions cover policy values, private privileges, and server-only progress introspection.
    status: implemented_original_adapter
  - component_id: taxalens-blind-review-disclosure-pattern-v1
    source_repository: karikris/taxalens
    source_commit: c5e87ead4fdb26d5c5624bbb8d8d67e46d8eddbc
    source_path: apps/web/src/review/domain/flickrReviewDisclosure.ts
    destination_path: supabase/migrations/20260718014600_blind_review_disclosure.sql
    migration_kind: interface_pattern
    reason: Preserve pre-decision evidence separation and controlled reveal while moving the authority boundary into ButterflyLens RLS, column grants, and security-invoker projections.
    build_week_scope: new
    source_license: MIT
    changes:
      - Expose only assignment identity/status, question, media-integrity, and rights fields before a decision; exclude campaign names, assignment round/reason, storage, model, query, comment, peer, and reviewer-identity fields.
      - Bind post-decision disclosure to the same reviewer's append-only event and expose banded model context and anonymous peer counts only.
      - Lock the local draft before fixture context reveal and reset to a fresh blind state before the decision can change.
    tests:
      - Static database tests for the blind campaign trigger, allowlisted projection, event-bound disclosure, grants, and identity-free shape.
      - Eighteen pgTAP assertions define privileges, views, RLS, and hidden base-table access.
      - Six component tests cover pre-decision absence, locked reveal, unavailable context, reset, attribution, and media readiness.
    status: implemented_original_adapter
  - component_id: taxalens-append-only-review-event-pattern-v1
    source_repository: karikris/taxalens
    source_commit: c5e87ead4fdb26d5c5624bbb8d8d67e46d8eddbc
    source_path: apps/web/src/review/domain/verificationEvents.ts
    destination_path: supabase/migrations/20260718015500_append_only_review_submission.sql
    migration_kind: interface_pattern
    reason: Preserve append-only correction lineage while making authenticated identity derivation, atomic assignment completion, blind-state capture, and database authorization ButterflyLens-owned.
    build_week_scope: new
    source_license: MIT
    changes:
      - Add one fixed-search-path authenticated RPC that derives reviewer, campaign, item, question, and image identity from the assigned row.
      - Require comment, confidence, decision time, duration, source version, explicit model version/unavailable state, context, and event fingerprint on every new event.
      - Revoke direct browser inserts and require corrections to supersede the current same-assignment event without mutation or deletion.
    tests:
      - Static database tests cover identity derivation, required fields, atomic completion, direct-insert closure, and supersession lineage.
      - Fourteen pgTAP assertions define RPC privileges, append-only table privileges, trigger presence, and core non-null event fields.
    status: implemented_original_adapter
  - component_id: taxalens-independent-adjudication-pattern-v1
    source_repository: karikris/taxalens
    source_commit: c5e87ead4fdb26d5c5624bbb8d8d67e46d8eddbc
    source_path: apps/web/src/review/domain/{verificationEvents.ts,verificationConsensus.ts}
    destination_path: supabase/migrations/20260718021000_conflict_adjudication_workflow.sql
    migration_kind: interface_pattern
    reason: Retain exact dissent, independence, and adjudication lineage while moving assignment authority, RLS, privacy, and append-only storage into ButterflyLens.
    build_week_scope: new
    source_license: MIT
    changes:
      - Project conflicts only from current unsuperseded decisive events by at least two independent reviewers and retain normalized links to every source event.
      - Require an active verified expert-level project member who did not author any source event, with one active adjudication assignment per conflict.
      - Expose a blind identity-free queue and derive Auth identity, source fingerprints, source reviewers, question, and image integrity server-side during append-only submission.
      - Preserve dissent after adjudication and force scientific_claim_allowed false.
    tests:
      - Static database tests cover effective conflict projection, adjudicator independence, source-derived lineage, append-only storage, privacy, indexed foreign keys, and pgTAP plan integrity.
      - Twenty-eight pgTAP assertions define tables, RLS, grants, functions, triggers, indexes, exact-event foreign keys, and core non-null fields.
    status: implemented_original_adapter
  - component_id: taxalens-reviewer-control-catalog-pattern-v1
    source_repository: karikris/taxalens
    source_commit: c5e87ead4fdb26d5c5624bbb8d8d67e46d8eddbc
    source_path: apps/web/src/review/domain/reviewerReliability.ts
    destination_path: supabase/migrations/20260718022000_reviewer_control_items.sql
    migration_kind: interface_pattern
    reason: Define private evidence-bound reviewer controls without copying upstream labels, fixtures, scores, or estimator code.
    build_week_scope: new
    source_license: MIT
    changes:
      - Define six closed control kinds with type-specific expected-answer shapes.
      - Require fully blind reviewer-control campaigns, governed same-project media, immutable evidence fingerprints and citations, and hidden exact assignment bindings.
      - Do not promote the rights-cleared provider fixture or any model output to ground truth.
    tests:
      - Static tests cover all control kinds, blindness, privacy, evidence binding, immutability, indexed foreign keys, and pgTAP plan integrity.
      - Eighteen pgTAP assertions define private tables, privileges, triggers, indexes, foreign keys, and required evidence.
    status: implemented_original_adapter
butterflylens_owned_changes:
  - ownership_id: australia-wide-community-product
    status: planned
    upstream_boundary: Static single-target researcher replay with no login.
    butterflylens_responsibility: Scoped Australian projects, contributors, reviewers, moderators, evidence maturity, and public community projections.
  - ownership_id: live-national-map
    status: planned
    upstream_boundary: Operational SVG Flickr-cluster map plus partial Geographic Impact analytics and newly pinned renderer dependencies.
    butterflylens_responsibility: Live MapLibre/H3 Australian evidence map, ALA comparison, administrative and IBRA scopes, synchronized table, and non-WebGL experience.
  - ownership_id: live-m5-pipeline
    status: planned
    upstream_boundary: Static replay that does not invoke BioMiner or a model runtime.
    butterflylens_responsibility: Server-side pinned BioMiner queue, M5/MPS worker control, health, cancellation, progress, and verified artifact admission.
  - ownership_id: all-butterfly-taxonomy
    status: partially_implemented
    upstream_boundary: Papilio demoleus pilot target.
    butterflylens_responsibility: Reproducible Australian butterfly hierarchy, identifier crosswalks, synonyms, conflicts, and sourced-name governance.
    completed_scope:
      - Frozen Australian Faunal Directory Papilionoidea hierarchy across the seven configured ranks.
      - Conservative ALA, GBIF and iNaturalist identifier crosswalk with immutable provider receipts.
      - Open conflict ledger for every missing, non-exact, incompatible or provider-status relationship.
      - Sourced accepted scientific names, provider-linked synonyms and English Australian vernacular assertions with collision-safe query eligibility.
      - First Nations language-name policy, assertion/decision contracts and an intentionally empty zero-approved review manifest.
    remaining_scope:
      - Human taxonomic resolution evidence for open cross-provider conflicts.
      - Authorized First Nations language-name assertions only if a relevant community later grants purpose-specific permission.
  - ownership_id: community-accounts
    status: partially_implemented
    upstream_boundary: Credential-free local IndexedDB review and optional static repository snapshots.
    butterflylens_responsibility: Supabase Auth, least-privilege RLS, roles, assignments, consent, private metadata, moderation, and audit.
  - ownership_id: private-reviewer-reliability
    status: planned
    upstream_boundary: Aggregate anonymous agreement and control-set metrics with unweighted human consensus.
    butterflylens_responsibility: Private domain-specific uncertainty-aware estimates shrunk toward equal weight, with no public ranking or model-vote shortcut.
  - ownership_id: contributor-experience
    status: partially_implemented
    upstream_boundary: Researcher-oriented fixture mission, evidence, local review, dashboard, and replay.
    butterflylens_responsibility: Accessible onboarding, consent, attribution, history, correction, escalation, adjudication, moderation, takedown, and dignity safeguards.
  - ownership_id: ala-comparison
    status: planned
    upstream_boundary: GBIF and optional direct-iNaturalist provider-union architecture; no ALA baseline adapter or comparison.
    butterflylens_responsibility: Rights-aware ALA snapshots, sensitive-data controls, taxon reconciliation, conservative provider union, and explicit candidate/review/release comparison.
notes:
  - One exact rights-cleared Wikimedia Commons review fixture was copied from an immutable TaxaLens commit; no TaxaLens code, generated data, model, build, broad fixture bundle, or runtime artifact was copied.
  - Completed entries are original ButterflyLens contract adaptations bound to the immutable TaxaLens source; they are not broad source copies.
  - Quality estimation is partial and the evidence-tool adapter remains planned; neither may be reported as implemented.
  - The static Papilio replay and its measurements are evidence about TaxaLens, not ButterflyLens fixtures or outcomes.
  - Later migrations must record exact copied or adapted files and retain the MIT notice where required.
